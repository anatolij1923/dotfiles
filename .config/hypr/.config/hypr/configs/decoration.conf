source = ~/.config/hypr/colors.conf

general {
  gaps_in = 3
  gaps_out = 6
  gaps_workspaces = 80

  border_size = 0

  col.active_border = $secondary
  col.inactive_border = $on_secondary

  resize_on_border = true

  allow_tearing = false

  layout = dwindle

  snap {
    enabled = true
  } 
} 

decoration {
  rounding = 24
  rounding_power = 2

  active_opacity = 1.0
  inactive_opacity = 1.0


  shadow {
    enabled = true
    range = 60
    render_power = 10
    color = rgba(00000050)
  } 

  blur {
    enabled = false
    size = 7
    passes = 2

    ignore_opacity = true
    xray = false
  } 
} 
